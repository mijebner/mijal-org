<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijal Iastrebner — Consultoría estratégica</title>
<meta name="description" content="Acompaño líderes y organizaciones a construir estructuras que sostengan su impacto. Biblioteca de recursos, clases online y consultoría estratégica.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site/styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="site/LangContext.jsx"></script>
<script type="text/babel" src="site/Primitives.jsx"></script>
<script type="text/babel" src="site/Nav.jsx"></script>
<script type="text/babel" src="site/Hero.jsx"></script>
<script type="text/babel" src="site/AboutServices.jsx"></script>
<script type="text/babel" src="site/Library.jsx"></script>
<script type="text/babel" src="site/Classes.jsx"></script>
<script type="text/babel" src="site/CTAFooter.jsx"></script>
<script type="text/babel" src="site/Tweaks.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroAccent": "naranja",
  "libraryLayout": "featured-grid",
  "marqueeSpeed": "normal",
  "orbIntensity": "medium",
  "classesStyle": "blur"
}/*EDITMODE-END*/;

function App() {
  const [config, setConfig] = React.useState(TWEAK_DEFAULTS);

  // Scroll-reveal observer
  React.useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          obs.unobserve(e.target);
        }
      }),
      { threshold: 0.12, rootMargin: '0px 0px -60px 0px' }
    );
    const selectors = '.reveal, .reveal-left, .reveal-right, .reveal-scale, .stagger';
    document.querySelectorAll(selectors).forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, [config.libraryLayout, config.classesStyle]);

  // Apply config via CSS vars + data attrs
  React.useEffect(() => {
    const root = document.documentElement;
    // Marquee speed
    const speeds = { slow: '60s', normal: '42s', fast: '28s' };
    document.querySelectorAll('.marquee-track').forEach(el => {
      el.style.animationDuration = speeds[config.marqueeSpeed] || '42s';
    });
    // Orb intensity
    const intensities = { subtle: .2, medium: .4, vivid: .7 };
    document.querySelectorAll('.orb').forEach(el => {
      el.style.opacity = intensities[config.orbIntensity] ?? .4;
    });
    // Hero accent: swap background
    const hero = document.getElementById('inicio');
    if (hero) {
      const colors = { naranja: 'var(--naranja)', violeta: 'var(--violeta)', ink: 'var(--ink)' };
      hero.style.background = colors[config.heroAccent] || 'var(--naranja)';
    }
  });

  return (
    <LangProvider>
      <Nav />
      <Hero />
      <About />
      <Services />
      <Library layout={config.libraryLayout} />
      <Classes style={config.classesStyle} />
      <CallToAction />
      <Footer />
      <Tweaks config={config} setConfig={setConfig} />
    </LangProvider>
  );
}

function tryMount() {
  const needed = ['Nav','Hero','About','Services','Library','Classes','CallToAction','Footer','Tweaks','LangProvider'];
  if (needed.some(n => !window[n])) return setTimeout(tryMount, 40);
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
tryMount();
</script>
</body>
</html>
